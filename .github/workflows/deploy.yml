name: CI Build and Docker Push

# Trigger: Run when code is pushed to the `main` branch or a pull request targets `main`
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest  # Use GitHub-hosted virtual environment

    steps:
    # 1. Checkout the repository code
    - name: Checkout code
      uses: actions/checkout@v3

    # 2. Log in to Docker Hub (credentials supplied via GitHub Secrets)
    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # 3. Build and push Python app image (FastAPI web server and background worker)
    - name: Build and push Python App Image
      uses: docker/build-push-action@v4
      with:
        context: .  # Context: repository root
        file: ./Dockerfile  # Dockerfile located at repository root
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/realtime-auction-backend:latest
          ${{ secrets.DOCKER_USERNAME }}/realtime-auction-backend:${{ github.sha }}

    # 4. Build and push high-performance Go service image (for the Bid ingestion API)
    - name: Build and push Go Bid Service Image
      uses: docker/build-push-action@v4
      with:
        context: ./bid-service  # Context: Go service directory
        file: ./bid-service/Dockerfile  # Dockerfile for the Go service
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/realtime-auction-bid-service:latest
          ${{ secrets.DOCKER_USERNAME }}/realtime-auction-bid-service:${{ github.sha }}