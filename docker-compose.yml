version: '3.8'

services:
  # -------------------------------------------
  # Infrastructure
  # -------------------------------------------
  db:
    image: postgres:15-alpine
    container_name: auction_db
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - auction_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: auction_redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - auction_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: auction_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - auction_net

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: auction_kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - auction_net

  # -------------------------------------------
  # Application Layer (Microservices)
  # -------------------------------------------

  # 1. High-throughput Bid Ingestion API (Go)
  bid-api:
    build: 
      context: ./bid-service
      dockerfile: Dockerfile
    container_name: auction_bid_api_go
    ports:
      - "8080:8080" # Accept bid requests from outside on port 8080.
    networks:
      - auction_net
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - REDIS_ADDR=redis:6379
      - KAFKA_BROKER=kafka:29092 # Use port 29092 within the Docker network.
      - KAFKA_TOPIC=auction-bids
      - WORKER_COUNT=100

  # 2. WebSocket and Notification Server (Python FastAPI)
  ws-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: auction_ws_server_python
    # Override the default Dockerfile CMD and run in web server mode.
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000" # Expose WebSocket connections externally on port 8000.
    networks:
      - auction_net
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - REDIS_URL=redis://redis:6379

  # 3. Background Kafka Worker (Python Script)
  bid-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: auction_worker_python
    # Run only the worker script in an infinite loop (no FastAPI server).
    command: python -m app.worker
    # No port mapping needed because the background worker has no direct external traffic.
    networks:
      - auction_net
    depends_on:
      db:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092

volumes:
  postgres_data:
  redis_data:
  kafka_data:

networks:
  auction_net:
    driver: bridge